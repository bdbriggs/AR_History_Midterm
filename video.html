<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PastPort Experience</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Georgia, serif;
      color: white;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.2);
    }

    .title {
      position: absolute;
      bottom: 80px;
      width: 100%;
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      opacity: 0.9;
      z-index: 2;
    }

    .button {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.9);
      color: #333;
      font-weight: bold;
      cursor: pointer;
      display: none;
      z-index: 2;
    }
    .tap-start {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      color: white;
      font-family: Georgia, serif;
      letter-spacing: 0.12em;
    }
    .tap-start p { font-size: 1.1rem; opacity: 0.7; margin: 0; }
    .tap-start .tap-icon { font-size: 2.5rem; margin-bottom: 14px; animation: tapPulse 1.8s ease-in-out infinite; }
    @keyframes tapPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.92)} }
  </style>
</head>

<body>

  <div class="tap-start" id="tapStart" onclick="startVideo()">
    <div class="tap-icon">▶</div>
    <p>Tap to begin</p>
  </div>

  <video id="videoPlayer" playsinline>
    <source src="media/courthouse.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="title">PastPort • Experiencing the Courthouse Through Time</div>

  <button class="button" id="continueBtn" onclick="goToExhibit()">Enter Exhibit</button>

  <script>
    const video = document.getElementById("videoPlayer");
    const button = document.getElementById("continueBtn");

    let playCount = 0;
    const maxLoops = 1;

    video.addEventListener("ended", function () {
      playCount++;

      if (playCount < maxLoops) {
        video.currentTime = 0;
        video.play();
      } else {
        button.style.display = "block";
      }
    });

    function startVideo() {
      document.getElementById("tapStart").style.display = "none";
      video.play();
    }

    function goToExhibit() {
      window.location.href = "exhibit.html";
    }

    document.addEventListener("keydown", function (event) {
      if (event.key === "d" || event.key === "D") {
        goToExhibit();
      }
    });
  </script>

</body>
</html>
